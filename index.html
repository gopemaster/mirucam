<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicons/site.webmanifest">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" id="themeStylesheet" href="./styles/mac.css">
    <title>Miru Cam</title>
</head>
<body>
    <form action="">
    <input type="color" id="colorPicker" value="#777777">
    <br>
    <input type="range" id="sizeSlider" min="280" max="800">
    <br>
    <select name="theme" id="borderTheme" onchange="changeTheme();">
        <option value="1">MacOS</option>
        <option value="0">None</option>
        <option value="2">Polaroid</option>
    </select>
    <br>
    <br>
    <input type="button" id="capture" value="Take Picture">
    </form>

    <div class="window" id="window">
        <div class="top-bar" id="topBar">
            <div class="left">
                <div class="btn1"></div>
                <div class="btn2"></div>
                <div class="btn3"></div>
            </div>
            <div class="middle"></div>
            <div class="right"></div>
        </div>
        <div id="loaderContainer">
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#F3F3F3"><path d="M323.67-111.17q-73-31.16-127.17-85.33t-85.33-127.17Q80-396.67 80-480.17t31.17-156.33q31.16-72.83 85.33-127t127.17-85.33Q396.67-880 480-880q13.67 0 23.5 9.83 9.83 9.84 9.83 23.5 0 13.67-9.83 23.5-9.83 9.84-23.5 9.84-138.33 0-235.83 97.5T146.67-480q0 138.33 97.5 235.83T480-146.67q138.33 0 235.83-97.5T813.33-480q0-13.67 9.84-23.5 9.83-9.83 23.5-9.83 13.66 0 23.5 9.83Q880-493.67 880-480q0 83.33-31.17 156.33-31.16 73-85.33 127.17t-127 85.33Q563.67-80 480.17-80q-83.5 0-156.5-31.17Z"/></svg>
            <p>Loading Camera...</p>
        </div>
        <div class="video-wrapper">
            <video src="" id="video" height="0"></video>
            <div class="video-overlay"></div>
        </div>
        <div class="bottom-bar">
            <button class="capture-btn" id="captureBtn">
                <svg xmlns="http://www.w3.org/2000/svg" height="35px" viewBox="0 -960 960 960" width="35px" fill="#EFEFEF"><path d="M480-264.67q73 0 123.17-50.16Q653.33-365 653.33-438q0-73.67-50.16-123.5Q553-611.33 480-611.33q-73.67 0-123.5 49.83T306.67-438q0 73 49.83 123.17 49.83 50.16 123.5 50.16Zm0-66.66q-46 0-76.33-30.67-30.34-30.67-30.34-76 0-46 30.34-76.33Q434-544.67 480-544.67q45.33 0 76 30.34Q586.67-484 586.67-438q0 45.33-30.67 76t-76 30.67ZM146.67-120q-27 0-46.84-19.83Q80-159.67 80-186.67v-502q0-26.33 19.83-46.5 19.84-20.16 46.84-20.16h140L360-840h240l73.33 84.67h140q26.34 0 46.5 20.16Q880-715 880-688.67v502q0 27-20.17 46.84Q839.67-120 813.33-120H146.67Z"/></svg>
            </button>
        </div>
    </div>

    <script src="./scripts/webcam.js"></script>
    <script src="/scripts/themeSwitcher.js"></script>
</body>
</html>
